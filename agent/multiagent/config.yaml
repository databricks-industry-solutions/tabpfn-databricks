## Multi-Agent Orchestrator Configuration
## Edit this file to configure the subagents for your environment.

# The LLM model the orchestrator uses to route requests.
orchestrator_model: "databricks-claude-sonnet-4-5"

subagents:
  - name: genie
    type: genie
    # TODO: Replace with your actual Genie Space ID (UUID from the Genie space URL).
    # Run notebook `agent/01_create_genie_space.ipynb` to create one, then paste
    # the space_id here.
    space_id: "01f11473195519d183ef8629160fa6a9"
    description: >
      Query the Enterprise Sales Analytics Genie space for structured data
      analysis. Supports complex SQL with JOINs, CTEs, window functions, and
      aggregations in a single query. Use this for questions about sales
      pipeline, revenue, accounts, reps, products, opportunity trends,
      promotions, and quota attainment. Key schema notes:
      opportunities.stage values are 'Closed/Won', 'Closed/Lost',
      'Negotiation', 'Discovery', 'Demo'. Use 'Closed/Won' for won deals.
      opportunities.has_promotion (boolean) flags promoted deals.
      promotions table has promotion_type ('Discount', 'Delivery Support',
      'Enablement') and had_effect (boolean). JOIN promotions ON
      opportunity_id for promotion analysis. Monetary columns:
      opportunity_products.line_acv (line item ACV),
      accounts.annual_revenue_mm. There are 8 products, ~500 accounts,
      ~3500 opportunities, ~350 promotions.

  - name: tabpfn
    type: mcp
    # The Unity Catalog connection name configured with is_mcp_connection: 'true'.
    connection_name: "tabpfn-external-mcp"
    # Display name exposed to the MCP protocol. Defaults to `name` if omitted.
    server_name: "tabpfn-external-mcp"
    # Seconds to wait for each MCP tool call to complete (default: 120).
    timeout_seconds: 120
    description: >
      Query the TabPFN external MCP server for tabular prediction tasks.
      Use this for classification and regression on structured tabular data.

